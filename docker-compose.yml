version: "3.8"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: dccooling-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dccooling
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dccooling"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  modbus-simulator:
    image: python:3.11-slim
    container_name: dccooling-simulator
    working_dir: /app
    volumes:
      - ./scripts/modbus_simulator.py:/app/simulator.py
    command: >
      python simulator.py
      --host 0.0.0.0
      --port 5020
      --control-port 8081
      --drift-interval 30
      --chillers 8
      --cooling-towers 12
      --precision-ac 80
      --cdu 20
      --anomaly-rate 0.005
    ports:
      - "5020:5020"
      - "8081:8081"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dccooling-backend
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: /app/config.json
      DB_CONN: postgres://postgres:postgres@timescaledb:5432/dccooling?sslmode=disable
      MODBUS_ADDR: modbus-simulator:5020
      DINGTALK_WEBHOOK: ""
      IT_POWER: "1700"
      DISTRIBUTION_LOSS: "250"
      OTHER_INFRA_POWER: "50"
      HTTP_PORT: ":8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      modbus-simulator:
        condition: service_started
    restart: unless-stopped

volumes:
  timescaledb_data:
