version: "3.8"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: dccooling-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dccooling
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  modbus-simulator:
    image: python:3.11-slim
    container_name: dccooling-simulator
    working_dir: /app
    volumes:
      - ../scripts/modbus_simulator.py:/app/simulator.py
    command: python simulator.py
    ports:
      - "5020:5020"
    depends_on:
      timescaledb:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dccooling-backend
    ports:
      - "8080:8080"
    environment:
      DB_CONN: postgres://postgres:postgres@timescaledb:5432/dccooling?sslmode=disable
      MODBUS_ADDR: modbus-simulator:5020
      DINGTALK_WEBHOOK: ""
      IT_POWER: "2000"
      HTTP_PORT: ":8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      modbus-simulator:
        condition: service_started

volumes:
  timescaledb_data:
